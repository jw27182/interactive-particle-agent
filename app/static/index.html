<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Particle Interaction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <canvas id="particleCanvas"></canvas>
        <div id="ui-overlay">
            <h1>Agent Interactive Particles</h1>
            <p>Use your camera to interact with the particles.</p>
            <div id="status">Connecting to backend...</div>
            <div id="instructions">
                <ul>
                    <li>Move your hand to attract particles</li>
                    <li>Pinch (thumb + index) to create an explosion</li>
                </ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
